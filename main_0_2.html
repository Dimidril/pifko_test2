<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<title>Pifko_CatchFresh</title>
	<style>
		:root {
			--yellow: #ffd83d;
			--yellow-dark: #ffcb1f;
			--green-1: #d8f34a;
			--green-2: #c3e63d;
			--text: #111111;
			--shadow: #111111;
			--progress: 0%;
		}

		* { box-sizing: border-box; }

		html, body {
			margin: 0;
			width: 100%;
			/* dvh — динамический viewport, учитывает адресную строку браузера */
			height: 100dvh;
			overflow: hidden;
			background: #111;
			font-family: Inter, Arial, Helvetica, sans-serif;
			-webkit-text-size-adjust: 100%;
			text-size-adjust: 100%;
		}

		body {
			/* Используем dvh вместо vh и fixed вместо absolute */
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			/* bottom: env(safe-area-inset-bottom, 0) учитывается через padding в .screen */
			bottom: 0;
			width: 100%;
			height: 100dvh;
		}

		#unity-wrap {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			width: 100%;
			/* dvh гарантирует что враппер не выходит за пределы реального видимого экрана */
			height: 100dvh;
			overflow: hidden;
			background: #111;
		}

		#unity-canvas {
			position: absolute;
			inset: 0;
			display: block;
			width: 100%;
			height: 100%;
			background: transparent;
			z-index: 1;
		}

		.screen {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			/* Высота — динамическая, без переполнения */
			width: 100%;
			height: 100%;
			z-index: 5;
			display: flex;
			flex-direction: column;
			/* Safe area insets + минимальный отступ */
			padding-top: max(18px, env(safe-area-inset-top));
			padding-right: max(16px, env(safe-area-inset-right));
			/* Ключевой фикс: нижний padding учитывает safe area (notch/home bar) */
			padding-bottom: max(18px, env(safe-area-inset-bottom));
			padding-left: max(16px, env(safe-area-inset-left));
			overflow: hidden;
			transition: opacity .35s ease, visibility .35s ease;
		}

		.screen.hidden {
			opacity: 0;
			visibility: hidden;
			pointer-events: none;
		}

		.start-screen {
			color: var(--text);
			background:
					radial-gradient(circle at 16% 24%, rgba(255, 227, 93, .22) 0 7%, rgba(255, 227, 93, 0) 7.5%),
					radial-gradient(circle at 76% 18%, rgba(255, 227, 93, .18) 0 5%, rgba(255, 227, 93, 0) 5.5%),
					radial-gradient(circle at 28% 40%, rgba(255, 227, 93, .14) 0 8%, rgba(255, 227, 93, 0) 8.5%),
					radial-gradient(circle at 84% 34%, rgba(255, 227, 93, .2) 0 6%, rgba(255, 227, 93, 0) 6.5%),
					radial-gradient(circle at 68% 66%, rgba(255, 227, 93, .18) 0 4%, rgba(255, 227, 93, 0) 4.5%),
					radial-gradient(circle at 11% 76%, rgba(255, 227, 93, .16) 0 5%, rgba(255, 227, 93, 0) 5.5%),
					radial-gradient(circle at 88% 78%, rgba(255, 227, 93, .14) 0 3.8%, rgba(255, 227, 93, 0) 4.2%),
					radial-gradient(circle at 48% 84%, rgba(255, 227, 93, .14) 0 2.8%, rgba(255, 227, 93, 0) 3.2%),
					#f7f6f1;
		}

		.loading-screen {
			align-items: center;
			justify-content: center;
			color: var(--text);
			background:
					radial-gradient(circle at 14% 12%, rgba(244, 255, 141, .22) 0 1%, rgba(244, 255, 141, 0) 1.2%),
					radial-gradient(circle at 22% 24%, rgba(244, 255, 141, .22) 0 5%, rgba(244, 255, 141, 0) 5.3%),
					radial-gradient(circle at 81% 21%, rgba(244, 255, 141, .22) 0 4.5%, rgba(244, 255, 141, 0) 4.9%),
					radial-gradient(circle at 12% 58%, rgba(244, 255, 141, .18) 0 6%, rgba(244, 255, 141, 0) 6.4%),
					radial-gradient(circle at 86% 70%, rgba(244, 255, 141, .18) 0 5%, rgba(244, 255, 141, 0) 5.4%),
					radial-gradient(circle at 52% 82%, rgba(244, 255, 141, .16) 0 3%, rgba(244, 255, 141, 0) 3.3%),
					radial-gradient(circle at 38% 67%, rgba(244, 255, 141, .18) 0 1.4%, rgba(244, 255, 141, 0) 1.7%),
					radial-gradient(circle at 68% 46%, rgba(244, 255, 141, .16) 0 1.2%, rgba(244, 255, 141, 0) 1.6%),
					linear-gradient(180deg, var(--green-2), var(--green-1));
		}

		.brand {
			display: flex;
			align-items: center;
			min-height: 52px;
			margin-top: 8px;
			padding-inline: clamp(10px, 4vw, 24px);
		}

		.brand img {
			display: block;
			width: auto;
			height: clamp(28px, 6vw, 44px);
			max-width: min(55vw, 280px);
			object-fit: contain;
			object-position: left center;
		}

		.hero {
			margin-top: clamp(18px, 4vh, 34px);
			padding-inline: clamp(10px, 4vw, 24px);
			text-align: left;
		}

		.hero h1 {
			margin: 0;
			font-size: clamp(44px, 8vw, 84px);
			line-height: .94;
			letter-spacing: -.06em;
			font-weight: 900;
			max-width: 7ch;
		}

		.hero p {
			margin: 18px 0 0;
			font-size: clamp(22px, 4vw, 42px);
			line-height: 1.04;
			font-weight: 700;
			letter-spacing: -.04em;
			max-width: 11ch;
		}

		.art-start {
			flex: 1;
			display: flex;
			align-items: flex-end;
			justify-content: center;
			min-height: 0;
			/* Убираем нижний padding отсюда — он теперь в .bottom-bar */
			padding: 8px 0 0;
			overflow: hidden;
		}

		.art-loading-wrap {
			width: 100%;
			display: flex;
			justify-content: center;
			margin: 0 auto 28px;
		}

		.art-start img {
			display: block;
			width: min(94vw, 700px);
			max-height: 100%;
			object-fit: contain;
			object-position: bottom center;
			user-select: none;
			-webkit-user-drag: none;
		}

		.art-loading {
			display: block;
			width: min(62vw, 520px);
			max-width: 520px;
			min-width: 220px;
			object-fit: contain;
			object-position: center bottom;
			user-select: none;
			-webkit-user-drag: none;
		}

		.bottom-bar {
			/* Не используем position:absolute — кнопка остаётся в потоке flex-колонки */
			flex-shrink: 0;
			position: relative;
			z-index: 6;
			padding: 12px clamp(10px, 4vw, 24px) 0;
		}

		.play-btn {
			width: 100%;
			min-height: 72px;
			border: 3px solid #111;
			border-radius: 24px;
			background: var(--yellow);
			color: #111;
			font-size: clamp(22px, 4vw, 34px);
			font-weight: 900;
			letter-spacing: -.03em;
			box-shadow: 0 8px 0 var(--shadow);
			cursor: pointer;
			transition: transform .15s ease, box-shadow .15s ease;
			/* Гарантируем что кнопка не обрезается */
			display: block;
		}

		.play-btn:active {
			transform: translateY(4px);
			box-shadow: 0 4px 0 var(--shadow);
		}

		.loading-inner {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			width: 100%;
			height: 100%;
			text-align: center;
			padding: 24px;
		}

		.progress-shell {
			width: min(240px, 62vw);
			height: 30px;
			margin: 0 auto;
			padding: 3px;
			border: 3px solid #111;
			border-radius: 999px;
			background: #fff;
			overflow: hidden;
			box-shadow: 0 3px 0 rgba(17,17,17,.16);
		}

		.progress-fill {
			width: var(--progress);
			height: 100%;
			border-radius: 999px;
			background: linear-gradient(180deg, #ffe15b, #ffcc2e);
			transition: width .2s ease;
		}

		.loading-title {
			margin: 18px 0 0;
			padding: 0 18px;
			font-size: clamp(20px, 3.6vw, 38px);
			line-height: 1.15;
			font-weight: 900;
			letter-spacing: -.05em;
			max-width: 18ch;
		}

		.unity-loaded .screen {
			opacity: 0;
			visibility: hidden;
			pointer-events: none;
		}

		@media (min-aspect-ratio: 1/1) {
			.hero h1 { font-size: clamp(42px, 5.2vw, 72px); }
			.hero p { font-size: clamp(20px, 2.7vw, 34px); }
			.play-btn { min-height: 64px; }
			.art-loading { width: min(34vw, 400px); }
			.art-start img { width: min(58vw, 760px); }
		}
	</style>
</head>
<body>
<div id="unity-wrap">
	<canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>

	<section id="start-screen" class="screen start-screen">
		<div class="brand">
			<img id="brand-logo" src="img/logo.png" alt="Логотип" />
		</div>

		<div class="hero">
			<h1>Ловец<br>Свежести!</h1>
			<p>Налови скидку за 30 секунд</p>
		</div>

		<div class="art-start">
			<img id="start-illustration" src="img/pifkoMens.png" alt="Главная иллюстрация" />
		</div>

		<div class="bottom-bar">
			<button id="start-btn" class="play-btn" type="button">Играть</button>
		</div>
	</section>

	<section id="loading-screen" class="screen loading-screen hidden">
		<div class="loading-inner">
			<div class="art-loading-wrap">
				<img id="loading-illustration" class="art-loading" src="img/loadingImg.png" alt="Иллюстрация загрузки" />
			</div>

			<div class="progress-shell" aria-label="Прогресс загрузки">
				<div id="progress-fill" class="progress-fill"></div>
			</div>

			<div class="loading-title">Если что — это всё ради скидки</div>
		</div>
	</section>
</div>

<script>
	const wrap = document.getElementById('unity-wrap');
	const canvas = document.getElementById('unity-canvas');
	const startScreen = document.getElementById('start-screen');
	const loadingScreen = document.getElementById('loading-screen');
	const startBtn = document.getElementById('start-btn');
	const progressFill = document.getElementById('progress-fill');

	const buildUrl = 'Build';
	const loaderUrl = buildUrl + '/b1785e1518f39253a2bb278b6d869000.loader.js';

	const config = {
		dataUrl: buildUrl + "/07937dd9824c146fa8ea690d4a14713a.data",
		frameworkUrl: buildUrl + "/b5b956e877d19d232b667c1c005f60b7.framework.js",
		codeUrl: buildUrl + "/636f21f4d78a97543a840e13134c9aae.wasm",
		streamingAssetsUrl: "StreamingAssets",
		companyName: "DefaultCompany",
		productName: "Pifko_CatchFresh",
		productVersion: "1.2",
		matchWebGLToCanvasSize: true,
		cacheControl: function (url) {
			if (url.match(/\.data/) || url.match(/\.bundle/) || url.match(/\.wasm/)) {
				return "must-revalidate";
			}
			return "no-store";
		},
	};

	let unityStarted = false;

	function setProgress(value) {
		const percent = Math.max(0, Math.min(100, Math.round(value * 100)));
		document.documentElement.style.setProperty('--progress', percent + '%');
		progressFill.style.width = percent + '%';
	}

	function startUnity() {
		if (unityStarted) return;
		unityStarted = true;
		startScreen.classList.add('hidden');
		loadingScreen.classList.remove('hidden');
		setProgress(0);

		const script = document.createElement('script');
		script.src = loaderUrl;
		script.onload = () => {
			createUnityInstance(canvas, config, (progress) => setProgress(progress))
					.then(() => {
						wrap.classList.add('unity-loaded');
						setProgress(1);
					})
					.catch((message) => {
						alert(message);
						unityStarted = false;
						startScreen.classList.remove('hidden');
						loadingScreen.classList.add('hidden');
					});
		};
		script.onerror = () => {
			unityStarted = false;
			startScreen.classList.remove('hidden');
			loadingScreen.classList.add('hidden');
			alert('Не удалось загрузить Unity loader');
		};
		document.body.appendChild(script);
	}

	startBtn.addEventListener('click', startUnity, { passive: true });
</script>
</body>
</html>
