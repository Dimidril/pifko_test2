<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<title>Pifko_CatchFresh</title>
	<style>
		:root {
			--yellow: #ffd83d;
			--yellow-dark: #ffcb1f;
			--green-1: #d8f34a;
			--green-2: #c3e63d;
			--text: #111111;
			--shadow: #111111;
			--progress: 0%;
		}

		* { box-sizing: border-box; }

		html, body {
			margin: 0;
			width: 100%;
			height: 100dvh;
			overflow: hidden;
			background: #111;
			font-family: Inter, Arial, Helvetica, sans-serif;
			-webkit-text-size-adjust: 100%;
			text-size-adjust: 100%;
		}

		body {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			width: 100%;
			height: 100dvh;
		}

		#unity-wrap {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			width: 100%;
			height: 100dvh;
			overflow: hidden;
			background: #111;
		}

		#unity-canvas {
			position: absolute;
			inset: 0;
			display: block;
			width: 100%;
			height: 100%;
			background: transparent;
			z-index: 1;
		}

		.screen {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			width: 100%;
			height: 100%;
			z-index: 5;
			display: flex;
			flex-direction: column;
			padding-top: max(18px, env(safe-area-inset-top));
			padding-right: max(16px, env(safe-area-inset-right));
			padding-bottom: max(18px, env(safe-area-inset-bottom));
			padding-left: max(16px, env(safe-area-inset-left));
			overflow: hidden;
			transition: opacity .35s ease, visibility .35s ease;
		}

		.screen.hidden {
			opacity: 0;
			visibility: hidden;
			pointer-events: none;
		}

		.start-screen {
			position: relative;
			color: var(--text);
			background:
					radial-gradient(circle at 16% 24%, rgba(255, 227, 93, .22) 0 7%, rgba(255, 227, 93, 0) 7.5%),
					radial-gradient(circle at 76% 18%, rgba(255, 227, 93, .18) 0 5%, rgba(255, 227, 93, 0) 5.5%),
					radial-gradient(circle at 28% 40%, rgba(255, 227, 93, .14) 0 8%, rgba(255, 227, 93, 0) 8.5%),
					radial-gradient(circle at 84% 34%, rgba(255, 227, 93, .2) 0 6%, rgba(255, 227, 93, 0) 6.5%),
					radial-gradient(circle at 68% 66%, rgba(255, 227, 93, .18) 0 4%, rgba(255, 227, 93, 0) 4.5%),
					radial-gradient(circle at 11% 76%, rgba(255, 227, 93, .16) 0 5%, rgba(255, 227, 93, 0) 5.5%),
					radial-gradient(circle at 88% 78%, rgba(255, 227, 93, .14) 0 3.8%, rgba(255, 227, 93, 0) 4.2%),
					radial-gradient(circle at 48% 84%, rgba(255, 227, 93, .14) 0 2.8%, rgba(255, 227, 93, 0) 3.2%),
					#f7f6f1;

			/* важно */
			isolation: isolate;
		}

		.loading-screen {
			align-items: center;
			justify-content: center;
			color: var(--text);
			background:
					radial-gradient(circle at 14% 12%, rgba(244, 255, 141, .22) 0 1%, rgba(244, 255, 141, 0) 1.2%),
					radial-gradient(circle at 22% 24%, rgba(244, 255, 141, .22) 0 5%, rgba(244, 255, 141, 0) 5.3%),
					radial-gradient(circle at 81% 21%, rgba(244, 255, 141, .22) 0 4.5%, rgba(244, 255, 141, 0) 4.9%),
					radial-gradient(circle at 12% 58%, rgba(244, 255, 141, .18) 0 6%, rgba(244, 255, 141, 0) 6.4%),
					radial-gradient(circle at 86% 70%, rgba(244, 255, 141, .18) 0 5%, rgba(244, 255, 141, 0) 5.4%),
					radial-gradient(circle at 52% 82%, rgba(244, 255, 141, .16) 0 3%, rgba(244, 255, 141, 0) 3.3%),
					radial-gradient(circle at 38% 67%, rgba(244, 255, 141, .18) 0 1.4%, rgba(244, 255, 141, 0) 1.7%),
					radial-gradient(circle at 68% 46%, rgba(244, 255, 141, .16) 0 1.2%, rgba(244, 255, 141, 0) 1.6%),
					linear-gradient(180deg, var(--green-2), var(--green-1));
		}

		.brand {
			display: flex;
			align-items: center;
			min-height: 52px;
			margin-top: 8px;
			padding-inline: clamp(10px, 4vw, 24px);
			position: relative;
			z-index: 3;
		}

		.brand img {
			display: block;
			width: auto;
			height: clamp(28px, 6vw, 44px);
			max-width: min(55vw, 280px);
			object-fit: contain;
			object-position: left center;
		}

		.hero {
			position: relative;
			z-index: 3;
			margin-top: clamp(18px, 4vh, 34px);
			padding-inline: clamp(10px, 4vw, 24px);
			padding-bottom: clamp(240px, 34vh, 380px);
			text-align: left;
			overflow: visible;
		}

		.hero h1 {
			margin: 0;
			font-size: clamp(44px, 8vw, 84px);
			line-height: .94;
			letter-spacing: -.06em;
			font-weight: 900;
			max-width: 7ch;
		}

		.hero p {
			margin: 18px 0 0;
			font-size: clamp(22px, 4vw, 42px);
			line-height: 1.04;
			font-weight: 700;
			letter-spacing: -.04em;
			max-width: 11ch;
		}

		.art-start {
			position: absolute;
			left: 50%;
			bottom: 0;
			z-index: 1;
			width: 100vw;
			transform: translateX(-50%);
			display: flex;
			justify-content: center;
			align-items: flex-end;
			pointer-events: none;
			overflow: visible;
			height: min(58vh, 560px);
		}

		.art-start img {
			width: min(135vw, 1100px);
			max-height: 100%;
			height: auto;
			object-fit: contain;
		}

		.art-loading-wrap {
			width: 100%;
			display: flex;
			justify-content: center;
			margin: 0 auto 28px;
		}

		.art-loading {
			display: block;
			width: 620px;
			max-width: 520px;
			min-width: 220px;
			object-position: center bottom;
			user-select: none;
			-webkit-user-drag: none;
		}
		
		.bottom-bar {
			flex-shrink: 0;
			position: relative;
			z-index: 3;
			margin-top: auto;
			padding:
					0
					clamp(10px, 4vw, 24px)
					calc(18px + env(safe-area-inset-bottom));
		}

		.play-btn {
			width: 100%;
			min-height: 72px;
			border: 3px solid #111;
			border-radius: 24px;
			background: var(--yellow);
			color: #111;
			font-size: clamp(22px, 4vw, 34px);
			font-weight: 900;
			letter-spacing: -.03em;
			box-shadow: 0 8px 0 var(--shadow);
			cursor: pointer;
			transition: transform .15s ease, box-shadow .15s ease;
			display: block;

		}

		.play-btn:active {
			transform: translateY(4px);
			box-shadow: 0 4px 0 var(--shadow);
		}

		.loading-inner {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			width: 100%;
			height: 100%;
			text-align: center;
			padding: 24px;
		}

		.progress-shell {
			width: min(240px, 62vw);
			height: 30px;
			margin: 0 auto;
			padding: 3px;
			border: 3px solid #111;
			border-radius: 999px;
			background: #fff;
			overflow: hidden;
			box-shadow: 0 3px 0 rgba(17,17,17,.16);
		}

		.progress-fill {
			width: var(--progress);
			height: 100%;
			border-radius: 999px;
			background: linear-gradient(180deg, #ffe15b, #ffcc2e);
			transition: width .2s ease;
		}

		.loading-title {
			margin: 18px 0 0;
			padding: 0 18px;
			width: min(92vw, 720px);

			font-size: clamp(14px, 2.2vw, 38px);
			line-height: 1.1;
			font-weight: 900;
			letter-spacing: -.04em;

			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;

			opacity: 1;
			transition: opacity 0.4s ease;
		}

		.loading-title.changing {
			opacity: 0.6;
		}

		.unity-loaded .screen {
			opacity: 0;
			visibility: hidden;
			pointer-events: none;
		}

		@media (min-aspect-ratio: 1/1) {
			.hero h1 { font-size: clamp(42px, 5.2vw, 72px); }
			.hero p { font-size: clamp(20px, 2.7vw, 34px); }
			.play-btn { min-height: 64px; }
			.art-loading { width: min(34vw, 400px); }
			.art-start img {
				width: min(58vw, 760px);
				transform: translateY(20px);
			}
			.hero {
				padding-bottom: clamp(180px, 22vh, 320px);
			}
		}
	</style>
</head>
<body>
<div id="unity-wrap">
	<canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>

	<section id="start-screen" class="screen start-screen">
		<div class="brand">
			<img id="brand-logo" src="img/logo.png" alt="Логотип" />
		</div>

		<div class="hero">
			<h1>Ловец<br>Свежести!</h1>
			<p>Налови скидку за 30 секунд</p>
		</div>

		<div class="art-start">
			<img id="start-illustration" src="img/pifkoMens.png" alt="Главная иллюстрация" />
		</div>

		<div class="bottom-bar">
			<button id="start-btn" class="play-btn" type="button">Играть</button>
		</div>
	</section>

	<section id="loading-screen" class="screen loading-screen hidden">
		<div class="loading-inner">
			<div class="art-loading-wrap">
				<img id="loading-illustration" class="art-loading" src="img/loadingImg.png" alt="Иллюстрация загрузки" />
			</div>

			<div class="progress-shell" aria-label="Прогресс загрузки">
				<div id="progress-fill" class="progress-fill"></div>
			</div>

			<div id="loading-title" class="loading-title">Если что — это всё ради скидки</div>
		</div>
	</section>
</div>

<script>
	const wrap = document.getElementById('unity-wrap');
	const canvas = document.getElementById('unity-canvas');
	const startScreen = document.getElementById('start-screen');
	const loadingScreen = document.getElementById('loading-screen');
	const startBtn = document.getElementById('start-btn');
	const progressFill = document.getElementById('progress-fill');
	const loadingTitle = document.getElementById('loading-title');

	// Коллекция фраз для смены
	const loadingPhrases = [
		"Охлаждаем пивко...",
		"Убеждаем муху улететь. Не получается.",
		"Калибруем стакан под твою руку...",
		"Проверяем, что арахис ещё есть...",
		"Загружаем атмосферу пятницы...",
		"Ищем куда спрятать скидку...",
		"Договариваемся с хмелем. Он несговорчивый.",
		"Готовим свежее. Как всегда."
	];

	let unityStarted = false;
	let phraseInterval = null;
	let isChangingPhrase = false;

	// Смена фразы с анимацией
	function changeLoadingPhrase() {
		if (isChangingPhrase) return;

		isChangingPhrase = true;
		loadingTitle.classList.add('changing');

		setTimeout(() => {
			const randomIndex = Math.floor(Math.random() * loadingPhrases.length);
			loadingTitle.textContent = loadingPhrases[randomIndex];
			loadingTitle.classList.remove('changing');
			isChangingPhrase = false;
		}, 200);
	}

	// Запуск смены фраз каждые 2.5 секунды
	function startPhraseRotation() {
		changeLoadingPhrase(); // Первая фраза сразу
		phraseInterval = setInterval(changeLoadingPhrase, 2500);
	}

	// Остановка смены фраз
	function stopPhraseRotation() {
		if (phraseInterval) {
			clearInterval(phraseInterval);
			phraseInterval = null;
		}
	}

	function setProgress(value) {
		const percent = Math.max(0, Math.min(100, Math.round(value * 100)));
		document.documentElement.style.setProperty('--progress', percent + '%');
		progressFill.style.width = percent + '%';
	}

	function startUnity() {
		if (unityStarted) return;
		unityStarted = true;
		startScreen.classList.add('hidden');
		loadingScreen.classList.remove('hidden');
		setProgress(0);

		// Запускаем ротацию фраз
		startPhraseRotation();

		const script = document.createElement('script');
		script.src = loaderUrl;
		script.onload = () => {
			createUnityInstance(canvas, config, (progress) => setProgress(progress))
					.then(() => {
						wrap.classList.add('unity-loaded');
						setProgress(1);
						stopPhraseRotation(); // Останавливаем при завершении загрузки
					})
					.catch((message) => {
						alert(message);
						unityStarted = false;
						startScreen.classList.remove('hidden');
						loadingScreen.classList.add('hidden');
						stopPhraseRotation();
					});
		};
		script.onerror = () => {
			unityStarted = false;
			startScreen.classList.remove('hidden');
			loadingScreen.classList.add('hidden');
			stopPhraseRotation();
			alert('Не удалось загрузить Unity loader');
		};
		document.body.appendChild(script);
	}

	const buildUrl = 'Build';
	const loaderUrl = buildUrl + '/6c3379dc40ada19ce023c359e6e2526c.loader.js';

	const config = {
		dataUrl: buildUrl + "/5db2bcd7a352776a6764165d2228719c.data",
		frameworkUrl: buildUrl + "/b5b956e877d19d232b667c1c005f60b7.framework.js",
		codeUrl: buildUrl + "/0012cd9b790f9f109b63455250776638.wasm",
		streamingAssetsUrl: "StreamingAssets",
		companyName: "DefaultCompany",
		productName: "Pifko_CatchFresh",
		productVersion: "1.2",
		matchWebGLToCanvasSize: true,
		cacheControl: function (url) {
			if (url.match(/\.data/) || url.match(/\.bundle/) || url.match(/\.wasm/)) {
				return "must-revalidate";
			}
			return "no-store";
		},
	};

	startBtn.addEventListener('click', startUnity, { passive: true });
</script>
</body>
</html>
